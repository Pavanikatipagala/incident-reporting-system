<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — IncidentHub</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <a class="navbar-brand" href="/">IncidentHub</a>
      <div class="nav-links">
        <a href="/register.html">Register</a>
        <a href="/">Home</a>
      </div>
    </nav>
    <div class="container" style="max-width: 420px">
      <h1>Login</h1>
      <p class="muted">Citizens, admins, and department staff use the same login form.</p>
      <div id="alert"></div>
      <div class="card">
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">Sign in</button>
        </form>
      </div>
      <p class="muted">No account? <a href="/register.html">Register as a citizen</a></p>
    </div>
    <script src="/js/api.js"></script>
    <script>
      if (getToken() && getUser()) {
        goToRoleHome();
      }
      const form = document.getElementById("login-form");
      const alertBox = document.getElementById("alert");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        alertBox.innerHTML = "";
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        try {
          const data = await apiRequest("/auth/login", {
            method: "POST",
            body: JSON.stringify({ email, password }),
          });
          saveSession(data.token, data.user);
          goToRoleHome();
        } catch (err) {
          alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        }
      });
    </script>
  </body>
</html>
